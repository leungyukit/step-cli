# StepFun API key. Can also be set via STEPFUN_API_KEY environment variable.
api_key = "sk-..."

# OpenAI-compatible endpoint. Defaults to https://api.stepfun.com/v1
# base_url = "https://api.stepfun.com/v1"

# Default model. Examples: step-2-16k, step-3.5-flash
model = "step-2-16k"

# Workspace directory. Defaults to the current working directory.
# workspace = "/path/to/project"

# Allow shell execution without --yolo.
allow_shell = false

# Maximum number of agent rounds per user message.
max_rounds = 30

# Context compression threshold as a fraction of the model context window.
# When exceeded, oldest non-system messages are dropped. Range 0.1-1.0.
context_threshold = 0.8

# Web search provider. Supported: "serper", "tavily", "duckduckgo".
# "serper" and "tavily" require search_api_key.
# "duckduckgo" is free but uses HTML scraping and may be less stable.
# search_provider = "duckduckgo"

# API key for the configured web search provider (not needed for duckduckgo).
# search_api_key = "..."

# ASR model for audio transcription. Default: stepaudio-2.5-asr
# asr_model = "stepaudio-2.5-asr"

# Optional generation parameters.
# temperature = 0.7
# max_tokens = 4096
